services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_INITDB_SKIP_TZINFO: "1"
      TZ: ${TZ}
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql:/docker-entrypoint-initdb.d:ro
    command:
      - mysqld
      - --innodb_buffer_pool_size=2G
      - --innodb_buffer_pool_instances=2
      - --max_connections=150
      - --thread_cache_size=50
      - --innodb_flush_log_at_trx_commit=1
      - --tmp_table_size=64M
      - --max_heap_table_size=64M
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-name-resolve=ON
      - --max_allowed_packet=64M
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=${DB_PASSWORD} mysqladmin ping -h 127.0.0.1 -u ${DB_USER}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  chronomancers_archives:
    build: .
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    working_dir: /app/src
    volumes:
      - app_secrets:/run/secrets
      # Runtime data on named volumes (writable by appuser, persisted across
      # recreates). Also shields these paths from the dev bind mount, whose host
      # files are root-owned and not writable by the container user.
      - backups_data:/app/src/backups
      - uploads_data:/app/src/static/uploads
    ports:
      - "5001:5001"
    environment:
      TZ: ${TZ}
      PYTHONUNBUFFERED: "1"
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      ENABLE_SSL: ${ENABLE_SSL:-false}
      DOMAIN: ${DOMAIN:-localhost}
      DAYS: ${DAYS:-825}
    init: true
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,ssl,urllib.request; s='https' if os.getenv('ENABLE_SSL','false').lower()=='true' else 'http'; c=ssl._create_unverified_context() if s=='https' else None; urllib.request.urlopen(f'{s}://127.0.0.1:5001/health', context=c)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
  app_secrets:
  backups_data:
  uploads_data:
