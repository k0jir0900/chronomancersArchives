services:
  mysql:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_INITDB_SKIP_TZINFO: "1"
      TZ: ${TZ}
    expose:
      - "3306"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    command:
      - mysqld
      - --innodb_buffer_pool_size=2G
      - --innodb_buffer_pool_instances=2
      - --max_connections=150
      - --thread_cache_size=50
      - --innodb_flush_log_at_trx_commit=1
      - --tmp_table_size=64M
      - --max_heap_table_size=64M
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-name-resolve=ON
      - --max_allowed_packet=64M
    healthcheck:
      test: ["CMD-SHELL", "MYSQL_PWD=${MYSQL_ROOT_PASSWORD} mysqladmin ping -h 127.0.0.1 -u root"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  chronomancers_archives:
    image: python:3.12-slim
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "5001:5001"
    environment:
      TZ: America/Santiago
      PYTHONUNBUFFERED: "1"
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
    init: true
    command: >
      sh -c "apt-get update > /dev/null 2>&1 &&
             apt-get install -y --no-install-recommends wget > /dev/null 2>&1 &&
             rm -rf /var/lib/apt/lists/* &&
             pip install --no-cache-dir -r /app/requirements.txt > /dev/null 2>&1 &&
             python app.py"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:5001/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql_data:
