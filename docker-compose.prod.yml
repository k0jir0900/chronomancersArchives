# Production overrides. Apply explicitly:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# No bind mount (image code only), resource limits, secure cookies.
services:
  mysql:
    deploy:
      resources:
        limits:
          memory: 3G

  chronomancers_archives:
    environment:
      SESSION_COOKIE_SECURE: "true"
    deploy:
      resources:
        limits:
          memory: 512M
